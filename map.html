<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Constants ──────────────────────────────────────────────────────
const CENTER_LAT = 10.7950, CENTER_LON = 106.7219;
const DEG_TO_M_LAT = 110540; // meters per degree latitude
const DEG_TO_M_LON = 111320 * Math.cos(CENTER_LAT * Math.PI / 180); // ~109600
const GROUND_SIZE = 1200;
const WALK_SPEED = 8, SPRINT_SPEED = 20, CAM_HEIGHT = 1.7;
const COLLISION_MARGIN = 5;

// ── Coordinate helpers ─────────────────────────────────────────────
function latLonToXZ(lat, lon) {
  return { x: (lon - CENTER_LON) * DEG_TO_M_LON, z: -(lat - CENTER_LAT) * DEG_TO_M_LAT };
}
function xzToLatLon(x, z) {
  return { lat: CENTER_LAT - z / DEG_TO_M_LAT, lon: CENTER_LON + x / DEG_TO_M_LON };
}

// ── Renderer ───────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// ── Scene ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0xc8d8e8, 0.0008);

// ── Camera ─────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 3000);
camera.position.set(-200, CAM_HEIGHT, 100);

// ── Lights ─────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(200, 400, 100);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -600; sun.shadow.camera.right = 600;
sun.shadow.camera.top = 600; sun.shadow.camera.bottom = -600;
sun.shadow.camera.far = 1200;
scene.add(sun);
const ambLight = scene.children.find(c => c.isAmbientLight);

// ── Day-Night Cycle ────────────────────────────────────────────────
let gameMinutes = 7 * 60; // start at 7:00 AM (minutes since midnight)
const hudTime = document.getElementById('hud-time');

// Landmark 81 night glow light (off by default)
const towerGlow = new THREE.PointLight(0xffd700, 0, 200);
towerGlow.position.set(0, 300, 0);
scene.add(towerGlow);

// Star field canvas as scene background at night
const starCanvas = document.createElement('canvas'); starCanvas.width = 512; starCanvas.height = 512;
const starCtx = starCanvas.getContext('2d');
const starDots = Array.from({ length: 50 }, () => ({ x: Math.random() * 512, y: Math.random() * 512, r: Math.random() * 1.5 + 0.5 }));
const starTex = new THREE.CanvasTexture(starCanvas);

function lerpColor(a, b, t) {
  const ar = (a >> 16) & 0xff, ag = (a >> 8) & 0xff, ab = a & 0xff;
  const br = (b >> 16) & 0xff, bg = (b >> 8) & 0xff, bb = b & 0xff;
  const r = Math.round(ar + (br - ar) * t), g = Math.round(ag + (bg - ag) * t), bl = Math.round(ab + (bb - ab) * t);
  return (r << 16) | (g << 8) | bl;
}

function updateDayNight(dt) {
  gameMinutes += dt; // 1 real second = 1 game minute
  if (gameMinutes >= 1440) gameMinutes -= 1440;
  const h = gameMinutes / 60; // fractional hour

  // Time display
  const hr = Math.floor(gameMinutes) % 1440;
  const hh = Math.floor(hr / 60), mm = Math.floor(hr % 60);
  const ampm = hh >= 12 ? 'PM' : 'AM';
  const h12 = hh === 0 ? 12 : hh > 12 ? hh - 12 : hh;
  hudTime.textContent = `${h12}:${String(mm).padStart(2, '0')} ${ampm}`;

  let skyColor, fogColor, ambInt, sunInt, isNight = false;
  if (h >= 6 && h < 7) { // Dawn
    const t = h - 6;
    skyColor = lerpColor(0x1a1a3e, 0xe87040, t);
    fogColor = lerpColor(0x2a2a4e, 0xd08050, t);
    ambInt = 0.3 + t * 0.3; sunInt = 0.3 + t * 0.7;
  } else if (h >= 7 && h < 17) { // Day
    skyColor = 0x87ceeb; fogColor = 0xc8d8e8; ambInt = 0.6; sunInt = 1.0;
  } else if (h >= 17 && h < 19) { // Sunset
    const t = (h - 17) / 2;
    skyColor = lerpColor(0x87ceeb, 0xc04020, t);
    fogColor = lerpColor(0xc8d8e8, 0xc07040, t);
    ambInt = 0.6 - t * 0.3; sunInt = 1.0 - t * 0.6;
  } else if (h >= 19 && h < 20) { // Dusk
    const t = h - 19;
    skyColor = lerpColor(0xc04020, 0x1a1a3e, t);
    fogColor = lerpColor(0xc07040, 0x2a2a4e, t);
    ambInt = 0.3 - t * 0.15; sunInt = 0.4 - t * 0.3;
  } else { // Night
    skyColor = 0x0a0a2e; fogColor = 0x1a1a2e; ambInt = 0.15; sunInt = 0.1; isNight = true;
  }

  scene.background.setHex(skyColor);
  scene.fog.color.setHex(fogColor);
  ambLight.intensity = ambInt;
  sun.intensity = sunInt;
  towerGlow.intensity = isNight ? 3 : 0;

  // Draw stars on background when night
  if (isNight) {
    starCtx.fillStyle = '#' + skyColor.toString(16).padStart(6, '0');
    starCtx.fillRect(0, 0, 512, 512);
    starCtx.fillStyle = '#fff';
    starDots.forEach(s => { starCtx.beginPath(); starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); starCtx.fill(); });
    starTex.needsUpdate = true;
    scene.background = starTex;
  }
}

// ── Rain / Weather System ──────────────────────────────────────────
const RAIN_COUNT = 500;
const rainGeo = new THREE.BufferGeometry();
const rainPositions = new Float32Array(RAIN_COUNT * 3);
for (let i = 0; i < RAIN_COUNT; i++) {
  rainPositions[i * 3] = (Math.random() - 0.5) * 500;
  rainPositions[i * 3 + 1] = Math.random() * 200;
  rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 500;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
const rainMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, transparent: true, opacity: 0.5 });
const rainMesh = new THREE.Points(rainGeo, rainMat);
rainMesh.visible = false;
scene.add(rainMesh);

const hudWeather = document.getElementById('hud-weather');
const weatherCycle = [{ name: 'Clear', icon: '☀️', dur: 60, count: 0 }, { name: 'Light Rain', icon: '🌧', dur: 30, count: 200 }, { name: 'Heavy Rain', icon: '🌧', dur: 60, count: 500 }];
let weatherIdx = 0, weatherTimer = 0;
const baseFogDensity = 0.0008;

function updateWeather(dt) {
  weatherTimer += dt;
  if (weatherTimer >= weatherCycle[weatherIdx].dur) {
    weatherTimer = 0;
    weatherIdx = (weatherIdx + 1) % weatherCycle.length;
    hudWeather.textContent = weatherCycle[weatherIdx].icon + ' ' + weatherCycle[weatherIdx].name;
  }
  const wc = weatherCycle[weatherIdx];
  rainMesh.visible = wc.count > 0;
  if (!rainMesh.visible) { scene.fog.density = baseFogDensity; return; }
  // Move rain particles downward + wind
  const pos = rainGeo.attributes.position.array;
  const cx = camera.position.x, cz = camera.position.z;
  for (let i = 0; i < wc.count; i++) {
    pos[i * 3 + 1] -= 30 * dt; // fall
    pos[i * 3] += 5 * dt;       // wind
    if (pos[i * 3 + 1] < 0) {
      pos[i * 3] = cx + (Math.random() - 0.5) * 500;
      pos[i * 3 + 1] = 150 + Math.random() * 50;
      pos[i * 3 + 2] = cz + (Math.random() - 0.5) * 500;
    }
  }
  rainGeo.attributes.position.needsUpdate = true;
  // Heavy rain: denser fog
  scene.fog.density = wc.count >= 500 ? 0.0018 : 0.0012;
}

// ── Ground plane with OSM tiles ────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x556b2f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Load 2x2 OSM tile grid as ground texture
(function loadGroundTiles() {
  const tileCanvas = document.createElement('canvas');
  tileCanvas.width = 512; tileCanvas.height = 512;
  const ctx = tileCanvas.getContext('2d');
  let loaded = 0;
  const tiles = [
    { x: 52985, y: 32526, dx: 0, dy: 0 },
    { x: 52986, y: 32526, dx: 256, dy: 0 },
    { x: 52985, y: 32527, dx: 0, dy: 256 },
    { x: 52986, y: 32527, dx: 256, dy: 256 },
  ];
  tiles.forEach(t => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      ctx.drawImage(img, t.dx, t.dy, 256, 256);
      if (++loaded === 4) {
        const tex = new THREE.CanvasTexture(tileCanvas);
        tex.colorSpace = THREE.SRGBColorSpace;
        groundMat.map = tex;
        groundMat.color.set(0xffffff);
        groundMat.needsUpdate = true;
      }
    };
    img.onerror = () => { loaded++; }; // Keep green fallback
    img.src = `https://tile.openstreetmap.org/16/${t.x}/${t.y}.png`;
  });
})();

// ── Saigon River (east edge) ───────────────────────────────────────
const riverGeo = new THREE.PlaneGeometry(200, GROUND_SIZE);
const riverMat = new THREE.MeshLambertMaterial({ color: 0x3a7ca5, transparent: true, opacity: 0.7 });
const river = new THREE.Mesh(riverGeo, riverMat);
river.rotation.x = -Math.PI / 2;
river.position.set(latLonToXZ(CENTER_LAT, 106.7260).x, -0.5, 0);
scene.add(river);

// ── Building storage for collision ─────────────────────────────────
const buildingBoxes = []; // { min: {x,z}, max: {x,z} }

function getBuildingColor(h) {
  if (h > 200) return 0x4060a0;
  if (h > 60) return 0x7090b0;
  if (h > 20) return 0xa0b4c8;
  return 0xc8b89a;
}

// ── Add a box building ─────────────────────────────────────────────
function addBoxBuilding(x, z, w, d, h, name) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color: getBuildingColor(h) });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true; mesh.receiveShadow = true;
  scene.add(mesh);
  buildingBoxes.push({ min: { x: x - w/2, z: z - d/2 }, max: { x: x + w/2, z: z + d/2 } });
  if (name) addLabel(name, x, h + 10, z);
  return mesh;
}

// ── Label sprite ───────────────────────────────────────────────────
function addLabel(text, x, y, z) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 32px Segoe UI, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  const lines = text.split('\n');
  lines.forEach((line, i) => { ctx.fillText(line, 257, 50 + i * 36); });
  ctx.fillStyle = '#fff';
  lines.forEach((line, i) => { ctx.fillText(line, 256, 49 + i * 36); });
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  sprite.position.set(x, y, z);
  sprite.scale.set(60, 15, 1);
  scene.add(sprite);
}

// ── Landmark 81 (always present) ───────────────────────────────────
(function createLandmark81() {
  // Tapered tower body
  const towerGeo = new THREE.CylinderGeometry(15, 22, 461, 8);
  const towerMat = new THREE.MeshPhongMaterial({ color: 0xb8c8e0, emissive: 0x102040, shininess: 80 });
  const tower = new THREE.Mesh(towerGeo, towerMat);
  tower.position.set(0, 461 / 2, 0);
  tower.castShadow = true; tower.receiveShadow = true;
  scene.add(tower);
  // Antenna spire
  const antennaGeo = new THREE.BoxGeometry(2, 65, 2);
  const antenna = new THREE.Mesh(antennaGeo, towerMat);
  antenna.position.set(0, 461 + 32, 0);
  antenna.castShadow = true;
  scene.add(antenna);
  // Collision box
  buildingBoxes.push({ min: { x: -25, z: -25 }, max: { x: 25, z: 25 } });
  // Label
  addLabel('Landmark 81\n461m', 0, 520, 0);
})();

// ── Fallback hardcoded buildings ───────────────────────────────────
const fallbackBuildings = [
  { x: -120, z: -80, w: 30, d: 30, h: 160, name: 'Park 1' },
  { x: -160, z: -60, w: 30, d: 30, h: 155, name: 'Park 2' },
  { x: -190, z: 20, w: 30, d: 30, h: 150, name: 'Park 3' },
  { x: -170, z: 90, w: 30, d: 30, h: 158, name: 'Park 4' },
  { x: -130, z: 140, w: 30, d: 30, h: 162, name: 'Park 5' },
  { x: -80, z: 160, w: 30, d: 30, h: 155, name: 'Park 6' },
  { x: -240, z: 0, w: 35, d: 35, h: 140, name: 'Central 1' },
  { x: -280, z: -50, w: 35, d: 35, h: 145, name: 'Central 2' },
  { x: -290, z: 50, w: 35, d: 35, h: 138, name: 'Central 3' },
  { x: 80, z: -100, w: 28, d: 28, h: 130, name: 'L1' },
  { x: 110, z: -50, w: 28, d: 28, h: 135, name: 'L2' },
  { x: 100, z: 50, w: 28, d: 28, h: 128, name: 'L3' },
  { x: 70, z: 110, w: 28, d: 28, h: 132, name: 'L4' },
];

function addFallbacks() {
  fallbackBuildings.forEach(b => addBoxBuilding(b.x, b.z, b.w, b.d, b.h, b.name));
}

// ── Fetch buildings from Overpass API ──────────────────────────────
let buildingCount = 0;
const hudBldg = document.getElementById('hud-bldg');
const loadingEl = document.getElementById('loading');
const errorMsg = document.getElementById('error-msg');

(async function fetchOSMBuildings() {
  const overpassUrl = 'https://overpass-api.de/api/interpreter';
  const query = `[out:json][timeout:25];(way["building"](10.7895,106.7165,10.8005,106.7273);relation["building"](10.7895,106.7165,10.8005,106.7273););out body;>;out skel qt;`;
  try {
    const resp = await fetch(overpassUrl, { method: 'POST', body: `data=${encodeURIComponent(query)}` });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Index nodes by id for coordinate lookup
    const nodes = {};
    data.elements.filter(e => e.type === 'node').forEach(n => { nodes[n.id] = n; });

    // Process ways with building tag
    const ways = data.elements.filter(e => e.type === 'way' && e.tags && e.tags.building);
    ways.forEach(way => {
      const coords = (way.nodes || []).map(nid => nodes[nid]).filter(Boolean);
      if (coords.length < 3) return;

      // Determine height
      let h = 10;
      if (way.tags['building:height']) h = parseFloat(way.tags['building:height']) || 10;
      else if (way.tags['building:levels']) h = (parseFloat(way.tags['building:levels']) || 3) * 3.5;
      else if (way.tags.height) h = parseFloat(way.tags.height) || 10;

      // Skip if this overlaps Landmark 81 position (we placed it manually)
      const pts = coords.map(n => latLonToXZ(n.lat, n.lon));
      const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
      const cz = pts.reduce((s, p) => s + p.z, 0) / pts.length;
      if (Math.abs(cx) < 30 && Math.abs(cz) < 30 && h > 100) return;

      // Build extruded shape from polygon
      try {
        const shape = new THREE.Shape();
        shape.moveTo(pts[0].x, pts[0].z);
        for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i].x, pts[i].z);
        shape.closePath();

        const extrudeSettings = { depth: h, bevelEnabled: false };
        const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        // ExtrudeGeometry extrudes along Z by default; rotate so it goes up (Y)
        geo.rotateX(-Math.PI / 2);

        const mat = new THREE.MeshLambertMaterial({ color: getBuildingColor(h) });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true; mesh.receiveShadow = true;
        scene.add(mesh);

        // Collision AABB
        const xs = pts.map(p => p.x), zs = pts.map(p => p.z);
        buildingBoxes.push({
          min: { x: Math.min(...xs), z: Math.min(...zs) },
          max: { x: Math.max(...xs), z: Math.max(...zs) }
        });
        buildingCount++;
      } catch (e) { /* skip malformed polygon */ }
    });

    hudBldg.textContent = buildingCount;
    loadingEl.style.display = 'none';
  } catch (err) {
    console.warn('Overpass API failed:', err);
    errorMsg.textContent = 'OSM data unavailable — showing key landmarks only';
    errorMsg.style.display = 'block';
    addFallbacks();
    buildingCount = fallbackBuildings.length;
    hudBldg.textContent = buildingCount + ' (fallback)';
    loadingEl.style.display = 'none';
  }
})();

// ── First-person controls ──────────────────────────────────────────
const velocity = new THREE.Vector3();
const keys = {};
let yaw = 0, pitch = 0;
let locked = false;

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

renderer.domElement.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
});

// ── Collision check ────────────────────────────────────────────────
function checkCollision(x, z) {
  for (const b of buildingBoxes) {
    if (x > b.min.x - COLLISION_MARGIN && x < b.max.x + COLLISION_MARGIN &&
        z > b.min.z - COLLISION_MARGIN && z < b.max.z + COLLISION_MARGIN) return true;
  }
  return false;
}

// ── HUD elements ───────────────────────────────────────────────────
const hudLat = document.getElementById('hud-lat');
const hudLon = document.getElementById('hud-lon');
const hudDir = document.getElementById('hud-dir');

function getCompass(yawVal) {
  const deg = (((-yawVal * 180 / Math.PI) % 360) + 360) % 360;
  const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── WebXR VR ───────────────────────────────────────────────────────
let inVR = false;
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (!ok) return;
    const btn = document.getElementById('vr-btn');
    btn.style.display = 'block';
    btn.addEventListener('click', () => {
      navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] }).then(session => {
        renderer.xr.setSession(session);
        inVR = true;
        session.addEventListener('end', () => { inVR = false; });
      });
    });
  });
}

// ── Resize ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── NPC Tour Guides ────────────────────────────────────────────────
const npcDefs = [
  { name: 'Linh', color: 0xe84393, lat: 10.7950, lon: 106.7219,
    msg: 'Welcome! Landmark 81 is Vietnam\'s tallest building at 461m. Built in 2018!' },
  { name: 'Minh', color: 0x0984e3, lat: 10.7940, lon: 106.7200,
    msg: 'This is Vinhomes Central Park, a premium residential complex with beautiful gardens.' },
  { name: 'Thu', color: 0x00b894, lat: 10.7960, lon: 106.7230,
    msg: 'The Saigon River runs along here. It connects Ho Chi Minh City to the sea!' },
];
const npcs = [];
const npcDialog = document.getElementById('npc-dialog');
const npcNameEl = document.getElementById('npc-name');
const npcMsgEl = document.getElementById('npc-msg');
const npcLabelsContainer = document.getElementById('npc-labels');
let dialogOpen = false, activeNPC = null;

function createNPC(def) {
  const pos = latLonToXZ(def.lat, def.lon);
  if (Math.abs(pos.x) < 30 && Math.abs(pos.z) < 30) { pos.x = 30; pos.z = 5; } // avoid tower
  const group = new THREE.Group();
  group.position.set(pos.x, 0, pos.z);
  const bMat = new THREE.MeshLambertMaterial({ color: def.color });
  const lMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.3), bMat); body.position.y = 0.75; group.add(body);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), bMat); head.position.y = 1.3; group.add(head);
  const legL = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.5, 0.2), lMat); legL.position.set(-0.12, 0.25, 0); group.add(legL);
  const legR = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.5, 0.2), lMat); legR.position.set(0.12, 0.25, 0); group.add(legR);
  group.castShadow = true; scene.add(group);
  const label = document.createElement('div'); label.className = 'npc-label';
  label.textContent = def.name; label.style.color = '#' + def.color.toString(16).padStart(6, '0');
  npcLabelsContainer.appendChild(label);
  return { group, def, pos, label };
}
npcDefs.forEach(d => npcs.push(createNPC(d)));

function showNPCDialog(npc) {
  npcNameEl.textContent = npc.def.name;
  npcMsgEl.textContent = npc.def.msg;
  npcDialog.style.display = 'block';
  dialogOpen = true; activeNPC = npc;
  document.exitPointerLock();
}
function dismissDialog() {
  if (!dialogOpen) return;
  npcDialog.style.display = 'none';
  dialogOpen = false; activeNPC = null;
  renderer.domElement.requestPointerLock();
}
document.addEventListener('click', () => { if (dialogOpen) dismissDialog(); });
document.addEventListener('keydown', e => {
  if (e.code === 'KeyE' && dialogOpen) dismissDialog();
});

// Project NPC label positions from 3D to 2D
function updateNPCLabels() {
  const w2 = window.innerWidth / 2, h2 = window.innerHeight / 2;
  npcs.forEach(npc => {
    const headPos = new THREE.Vector3(npc.pos.x, 1.7, npc.pos.z);
    headPos.project(camera);
    if (headPos.z > 1 || headPos.z < -1) { npc.label.style.display = 'none'; return; }
    npc.label.style.display = 'block';
    npc.label.style.left = (headPos.x * w2 + w2) + 'px';
    npc.label.style.top = (-headPos.y * h2 + h2) + 'px';
  });
}

// ── Collectible Cultural Items ──────────────────────────────────────
const collectibleDefs = [
  { name:'Lotus Flower', color:0xff69b4, lat:10.7938, lon:106.7198 },
  { name:'Lotus Flower', color:0xff69b4, lat:10.7955, lon:106.7228 },
  { name:'Banh Mi', color:0x8b5a2b, lat:10.7945, lon:106.7210 },
  { name:'Banh Mi', color:0x8b5a2b, lat:10.7952, lon:106.7215 },
  { name:'Non La Hat', color:0xe8d44d, lat:10.7942, lon:106.7222 },
  { name:'Non La Hat', color:0xe8d44d, lat:10.7948, lon:106.7205 },
  { name:'Coffee Cup', color:0x3e2723, lat:10.7958, lon:106.7212 },
  { name:'Coffee Cup', color:0x3e2723, lat:10.7935, lon:106.7225 },
];
const collectibles = [];
let itemsCollected = 0;
const hudItems = document.getElementById('hud-items');

collectibleDefs.forEach(def => {
  const p = latLonToXZ(def.lat, def.lon);
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 8),
    new THREE.MeshStandardMaterial({ color: def.color, emissive: def.color, emissiveIntensity: 0.4 }));
  mesh.position.set(p.x, 0.5, p.z);
  scene.add(mesh);
  collectibles.push({ def, pos: p, mesh, collected: false, fadeTimer: -1 });
});

function updateCollectibles(dt) {
  collectibles.forEach(c => {
    if (c.collected) {
      if (c.fadeTimer >= 0) {
        c.fadeTimer += dt;
        const t = c.fadeTimer / 0.3;
        const s = 1 + t * 0.5;
        c.mesh.scale.set(s, s, s);
        c.mesh.material.opacity = 1 - t;
        if (t >= 1) { scene.remove(c.mesh); c.fadeTimer = -1; }
      }
      return;
    }
    // Bob + spin
    c.mesh.position.y = 0.5 + Math.sin(clock.elapsedTime * Math.PI * 2) * 0.5;
    c.mesh.rotation.y += 1.5 * dt;
    // Auto-collect at 2m
    const dx = camera.position.x - c.pos.x, dz = camera.position.z - c.pos.z;
    if (Math.sqrt(dx * dx + dz * dz) < 2) {
      c.collected = true; c.fadeTimer = 0;
      c.mesh.material.transparent = true;
      itemsCollected++;
      hudItems.textContent = `🌿 Items: ${itemsCollected}/8`;
    }
  });
}

// ── Photo Spots ────────────────────────────────────────────────────
const photoSpotDefs = [
  { name: 'Landmark 81 View', lat: 10.7935, lon: 106.7215 },
  { name: 'Saigon River Sunset', lat: 10.7958, lon: 106.7235 },
  { name: 'Vinhomes Garden', lat: 10.7942, lon: 106.7198 },
];
const photoSpots = [];
const photosTaken = new Set();
const photoFlash = document.getElementById('photo-flash');
const photoPrompt = document.getElementById('photo-prompt');
const photoToast = document.getElementById('photo-toast');
const hudPhotos = document.getElementById('hud-photos');
let nearPhotoSpot = null;

photoSpotDefs.forEach(def => {
  const p = latLonToXZ(def.lat, def.lon);
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 8),
    new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffa000, emissiveIntensity: 0.6 }));
  sphere.position.set(p.x, 0.5, p.z);
  scene.add(sphere);
  photoSpots.push({ def, pos: p, mesh: sphere });
});

function takePhoto(spot) {
  if (photosTaken.has(spot.def.name)) return;
  photosTaken.add(spot.def.name);
  hudPhotos.textContent = `📸 Photos: ${photosTaken.size}/3`;
  // Flash
  photoFlash.style.opacity = '1';
  setTimeout(() => { photoFlash.style.opacity = '0'; }, 150);
  // Toast
  photoToast.textContent = `Photo saved! ${spot.def.name}`;
  photoToast.style.display = 'block';
  setTimeout(() => { photoToast.style.display = 'none'; }, 3000);
}

document.addEventListener('keydown', e => {
  if (e.code === 'KeyF' && nearPhotoSpot && !photosTaken.has(nearPhotoSpot.def.name)) takePhoto(nearPhotoSpot);
});

// ── Minimap + Compass ──────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap');
const mm = mmCanvas.getContext('2d');
const compCanvas = document.getElementById('compass');
const comp = compCanvas.getContext('2d');
const MM = 120, HALF = GROUND_SIZE / 2; // minimap size, world half-extent
function worldToMM(x, z) { return { mx: (x / HALF + 1) * MM / 2, my: (z / HALF + 1) * MM / 2 }; }

function drawMinimap() {
  mm.clearRect(0, 0, MM, MM);
  mm.fillStyle = '#2a3a2a'; mm.fillRect(0, 0, MM, MM);
  // Saigon River (curved blue band on east side)
  const rx = worldToMM(latLonToXZ(CENTER_LAT, 106.7260).x, 0).mx;
  mm.fillStyle = 'rgba(58,124,165,0.6)';
  mm.beginPath(); mm.moveTo(rx - 8, 0);
  mm.quadraticCurveTo(rx + 4, MM * 0.3, rx - 4, MM * 0.5);
  mm.quadraticCurveTo(rx + 6, MM * 0.7, rx - 6, MM);
  mm.lineTo(MM, MM); mm.lineTo(MM, 0); mm.closePath(); mm.fill();
  // Building footprints
  mm.fillStyle = 'rgba(160,160,160,0.5)';
  for (const b of buildingBoxes) {
    const tl = worldToMM(b.min.x, b.min.z), br = worldToMM(b.max.x, b.max.z);
    mm.fillRect(tl.mx, tl.my, Math.max(br.mx - tl.mx, 1), Math.max(br.my - tl.my, 1));
  }
  // Landmark 81 (yellow dot at center)
  const lm = worldToMM(0, 0);
  mm.fillStyle = '#FFD700'; mm.beginPath(); mm.arc(lm.mx, lm.my, 3, 0, Math.PI * 2); mm.fill();
  // NPC dots
  npcs.forEach(npc => {
    const p = worldToMM(npc.pos.x, npc.pos.z);
    mm.fillStyle = '#' + npc.def.color.toString(16).padStart(6, '0');
    mm.beginPath(); mm.arc(p.mx, p.my, 2, 0, Math.PI * 2); mm.fill();
  });
  // Collectible dots
  collectibles.forEach(c => {
    if (c.collected) return;
    const p = worldToMM(c.pos.x, c.pos.z);
    mm.fillStyle = '#' + c.def.color.toString(16).padStart(6, '0');
    mm.beginPath(); mm.arc(p.mx, p.my, 1.5, 0, Math.PI * 2); mm.fill();
  });
  // Player triangle indicating direction
  const pp = worldToMM(camera.position.x, camera.position.z);
  mm.save(); mm.translate(pp.mx, pp.my); mm.rotate(-yaw);
  mm.fillStyle = '#fff'; mm.beginPath();
  mm.moveTo(0, -4); mm.lineTo(-3, 3); mm.lineTo(3, 3); mm.closePath(); mm.fill();
  mm.restore();
}

function drawCompass() {
  const S = 50, C = S / 2, R = 18;
  comp.clearRect(0, 0, S, S);
  comp.save(); comp.translate(C, C); comp.rotate(yaw);
  comp.font = 'bold 10px sans-serif'; comp.textAlign = 'center'; comp.textBaseline = 'middle';
  comp.fillStyle = '#f44'; comp.fillText('N', 0, -R);
  comp.fillStyle = '#ccc'; comp.fillText('S', 0, R);
  comp.fillStyle = '#ccc'; comp.fillText('E', R, 0);
  comp.fillStyle = '#ccc'; comp.fillText('W', -R, 0);
  // Center dot
  comp.fillStyle = '#fff'; comp.beginPath(); comp.arc(0, 0, 2, 0, Math.PI * 2); comp.fill();
  comp.restore();
}

// ── Game loop ──────────────────────────────────────────────────────
const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.1);
  updateDayNight(dt);
  updateWeather(dt);

  if (!inVR) {
    // Movement
    const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? SPRINT_SPEED : WALK_SPEED;
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    const move = new THREE.Vector3();
    if (keys['KeyW']) move.add(forward);
    if (keys['KeyS']) move.sub(forward);
    if (keys['KeyD']) move.add(right);
    if (keys['KeyA']) move.sub(right);
    if (move.lengthSq() > 0) move.normalize().multiplyScalar(speed * dt);

    const newX = camera.position.x + move.x;
    const newZ = camera.position.z + move.z;
    const half = GROUND_SIZE / 2;

    // Collision + bounds
    if (!checkCollision(newX, camera.position.z) && Math.abs(newX) < half) camera.position.x = newX;
    if (!checkCollision(camera.position.x, newZ) && Math.abs(newZ) < half) camera.position.z = newZ;
    camera.position.y = CAM_HEIGHT;

    // Camera rotation
    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

    // Update HUD
    const ll = xzToLatLon(camera.position.x, camera.position.z);
    hudLat.textContent = ll.lat.toFixed(4);
    hudLon.textContent = ll.lon.toFixed(4);
    hudDir.textContent = getCompass(yaw);

    // NPC animation + proximity check
    let nearest = null, nearDist = Infinity;
    npcs.forEach(npc => {
      npc.group.rotation.y += 0.5 * dt;
      npc.group.children.forEach(c => { c.position.y += Math.sin(clock.elapsedTime * 2) * 0.001; });
      const dx = camera.position.x - npc.pos.x, dz = camera.position.z - npc.pos.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 8 && dist < nearDist) { nearest = npc; nearDist = dist; }
    });
    if (nearest && !dialogOpen) showNPCDialog(nearest);
    updateNPCLabels();
    // Photo spot proximity + glow animation
    nearPhotoSpot = null;
    photoSpots.forEach(s => {
      s.mesh.position.y = 0.5 + Math.sin(clock.elapsedTime * 3) * 0.15;
      const dx = camera.position.x - s.pos.x, dz = camera.position.z - s.pos.z;
      if (Math.sqrt(dx * dx + dz * dz) < 6 && !photosTaken.has(s.def.name)) nearPhotoSpot = s;
    });
    photoPrompt.style.display = nearPhotoSpot ? 'block' : 'none';
    updateCollectibles(dt);
    drawMinimap();
    drawCompass();
  }

  renderer.render(scene, camera);
});
</script>
