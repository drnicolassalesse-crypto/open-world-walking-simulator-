<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open World Walking Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; }
  canvas { display: block; }

  #blocker {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; cursor: pointer;
  }
  #blocker .panel {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 48px 56px;
    text-align: center; color: #fff;
    max-width: 440px;
  }
  #blocker h1 {
    font-size: 28px; font-weight: 300; margin-bottom: 12px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  #blocker p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; }
  #blocker .keys { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.45); }
  #blocker .keys kbd {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; padding: 2px 8px; margin: 0 2px; font-family: inherit;
  }

  #hud {
    position: fixed; bottom: 20px; left: 20px; z-index: 50;
    color: rgba(255,255,255,0.7); font-size: 12px;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 14px 18px;
    line-height: 1.8; pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  #hud .label { color: rgba(255,255,255,0.35); }

  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%; z-index: 50;
    pointer-events: none;
  }

  #vr-button {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
    color: #fff; font-family: inherit; font-size: 14px;
    padding: 12px 24px; cursor: pointer; display: none;
    transition: background 0.2s;
  }
  #vr-button:hover { background: rgba(60,60,200,0.6); }
  #vr-button.not-supported { color: rgba(255,255,255,0.4); cursor: default; }
  #vr-button.not-supported:hover { background: rgba(0,0,0,0.6); }

  #npc-dialog {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center;
  }
  #npc-dialog .dialog-box {
    background: rgba(20,20,30,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
    padding: 32px 40px; max-width: 400px; color: #fff; text-align: center;
  }
  #npc-dialog .npc-name {
    font-size: 20px; font-weight: 300; letter-spacing: 1px;
    margin-bottom: 10px; text-transform: uppercase;
  }
  #npc-dialog .npc-msg { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 20px; }
  #npc-dialog button {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px; color: #fff; padding: 8px 28px; cursor: pointer;
    font-family: inherit; font-size: 13px; transition: background 0.2s;
  }
  #npc-dialog button:hover { background: rgba(255,255,255,0.25); }

  #minimap {
    position: fixed; bottom: 20px; right: 20px; z-index: 50;
    width: 150px; height: 150px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    pointer-events: none; overflow: hidden;
  }

  #save-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 300; color: #fff; font-size: 13px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 8px 20px; pointer-events: none; opacity: 0; transition: opacity 0.4s;
  }
  #settings-panel {
    position: fixed; bottom: 60px; left: 20px; z-index: 60;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 10px 16px; display: none;
  }
  #settings-panel button {
    background: rgba(200,50,50,0.6); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; color: #fff; padding: 6px 16px; cursor: pointer;
    font-family: inherit; font-size: 12px;
  }

  #stamina-bar {
    width: 100%; height: 6px; background: rgba(0,0,0,0.3);
    border-radius: 3px; margin-top: 6px; overflow: hidden;
  }
  #stamina-fill { height: 100%; width: 100%; border-radius: 3px; transition: width 0.1s, background 0.3s; }

  #rain-overlay {
    position: fixed; inset: 0; z-index: 40; pointer-events: none;
    background: rgba(20,30,60,0.08); opacity: 0; transition: opacity 1s;
  }
  #lightning-flash {
    position: fixed; inset: 0; z-index: 45; pointer-events: none;
    background: #fff; opacity: 0; transition: opacity 0.1s;
  }

  #interact-hint {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    z-index: 50; color: rgba(255,255,255,0.8); font-size: 13px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 8px 18px; pointer-events: none; display: none;
  }
</style>
</head>
<body>

<div id="blocker">
  <div class="panel">
    <h1>Wanderer</h1>
    <p>An open world walking simulator.<br>Click anywhere to begin exploring.</p>
    <div class="keys">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;&middot;&nbsp;
      <kbd>Mouse</kbd> Look &nbsp;&middot;&nbsp;
      <kbd>Shift</kbd> Run &nbsp;&middot;&nbsp;
      <kbd>Esc</kbd> Pause
    </div>
  </div>
</div>

<div id="crosshair"></div>
<button id="vr-button">Enter VR</button>

<div id="hud">
  <span class="label">POS</span> <span id="hud-pos">0, 0, 0</span><br>
  <span class="label">DIR</span> <span id="hud-dir">N</span><br>
  <span class="label">ALT</span> <span id="hud-alt">0</span>m<br>
  <span class="label">TIME</span> <span id="hud-time">06:00</span><br>
  <span class="label">GEMS</span> <span id="hud-gems">0 / 15</span><br>
  <span class="label">SKY</span> <span id="hud-weather">☀️ Clear</span>
  <div id="stamina-bar"><div id="stamina-fill" style="background:#4CAF50"></div></div>
</div>

<div id="npc-dialog">
  <div class="dialog-box">
    <div class="npc-name" id="dialog-name"></div>
    <div class="npc-msg" id="dialog-msg"></div>
    <button id="dialog-close">Close</button>
  </div>
</div>
<div id="rain-overlay"></div>
<div id="lightning-flash"></div>
<div id="save-toast">Game saved</div>
<div id="settings-panel"><button id="reset-save-btn">Reset Save</button></div>
<canvas id="minimap" width="150" height="150"></canvas>
<div id="interact-hint">Press <kbd style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:3px;padding:1px 6px">E</kbd> to talk</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ── Constants ──────────────────────────────────────────────────────
const TERRAIN_SIZE = 2000;
const TERRAIN_SEGMENTS = 256;
const PLAYER_HEIGHT = 3.5;
const WALK_SPEED = 18;
const RUN_SPEED = 36;
const MOUSE_SENSITIVITY = 0.002;
const TREE_COUNT = 600;
const CLOUD_COUNT = 40;
const GRASS_PATCH_COUNT = 8000;

// ── Renderer ───────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// ── WebXR VR Setup ────────────────────────────────────────────────
let vrSession = null;
let inVR = false;
const vrButton = document.getElementById('vr-button');

// Camera rig: parent group we move for VR locomotion
const cameraRig = new THREE.Group();
cameraRig.add(new THREE.PerspectiveCamera()); // placeholder, replaced below

// VR controllers
const controllerModelFactory = new XRControllerModelFactory();
let controller0, controller1, grip0, grip1;
let vrTurnCooldown = 0;

function setupVRControllers() {
  controller0 = renderer.xr.getController(0);
  controller1 = renderer.xr.getController(1);
  grip0 = renderer.xr.getControllerGrip(0);
  grip1 = renderer.xr.getControllerGrip(1);
  grip0.add(controllerModelFactory.createControllerModel(grip0));
  grip1.add(controllerModelFactory.createControllerModel(grip1));
  cameraRig.add(controller0, controller1, grip0, grip1);

  // Visual ray for each controller
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-3)
  ]);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.5 });
  controller0.add(new THREE.Line(lineGeo.clone(), lineMat.clone()));
  controller1.add(new THREE.Line(lineGeo.clone(), lineMat.clone()));
}

async function initVR() {
  if (!navigator.xr) {
    vrButton.textContent = 'VR Not Supported';
    vrButton.classList.add('not-supported');
    vrButton.style.display = 'block';
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!supported) {
    vrButton.textContent = 'VR Not Supported';
    vrButton.classList.add('not-supported');
    vrButton.style.display = 'block';
    return;
  }
  vrButton.style.display = 'block';
  vrButton.addEventListener('click', toggleVR);
}

async function toggleVR() {
  if (vrButton.classList.contains('not-supported')) return;
  if (!inVR) {
    try {
      vrSession = await navigator.xr.requestSession('immersive-vr', {
        optionalFeatures: ['local-floor', 'bounded-floor']
      });
      renderer.xr.setSession(vrSession);
      vrSession.addEventListener('end', () => {
        inVR = false;
        vrButton.textContent = 'Enter VR';
        vrSession = null;
      });
      inVR = true;
      vrButton.textContent = 'Exit VR';
      // Hide DOM HUD in VR
      document.getElementById('hud').style.display = 'none';
      document.getElementById('crosshair').style.display = 'none';
      blocker.style.display = 'none';
    } catch (e) {
      console.warn('Failed to start VR session:', e);
    }
  } else if (vrSession) {
    vrSession.end();
  }
}

function getVRThumbstickAxes(handedness) {
  const session = renderer.xr.getSession();
  if (!session) return [0, 0];
  for (const source of session.inputSources) {
    if (source.handedness === handedness && source.gamepad) {
      const axes = source.gamepad.axes;
      // axes[2]=X, axes[3]=Y for thumbstick on standard mapping
      return [axes[2] || 0, axes[3] || 0];
    }
  }
  return [0, 0];
}

// ── Stamina ─────────────────────────────────────────────────────────
let stamina = 100, sprintLocked = false;
let velocityY = 0, onGround = true;
const staminaFill = document.getElementById('stamina-fill');
function getVRGripPressed() {
  const session = renderer.xr.getSession();
  if (!session) return false;
  for (const src of session.inputSources) {
    if (src.handedness === 'left' && src.gamepad && src.gamepad.buttons[1])
      return src.gamepad.buttons[1].pressed;
  }
  return false;
}

// ── Scene ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xC8DFF0, 0.0018);

// ── Camera ─────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 20, 0);

// Replace placeholder camera in rig with actual camera
cameraRig.remove(cameraRig.children[0]);
cameraRig.add(camera);
setupVRControllers();

// ── Lighting ───────────────────────────────────────────────────────
const ambientLight = new THREE.HemisphereLight(0x9DC4E8, 0x5A7E3A, 0.7);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xFFF4D6, 2.2);
sunLight.position.set(300, 400, 200);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -120;
sunLight.shadow.camera.right = 120;
sunLight.shadow.camera.top = 120;
sunLight.shadow.camera.bottom = -120;
sunLight.shadow.camera.near = 100;
sunLight.shadow.camera.far = 900;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);
scene.add(sunLight.target);

// ── Sun sphere ─────────────────────────────────────────────────────
const sunGeo = new THREE.SphereGeometry(12, 16, 16);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFFDE8 });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
sunMesh.position.copy(sunLight.position).normalize().multiplyScalar(800);
scene.add(sunMesh);

// ── Day/Night Cycle ─────────────────────────────────────────────────
let timeOfDay = 0.3; // 0-1, 0.3=morning, 0.5=noon, 0=midnight
const DAY_DURATION = 300; // 5 minutes real time = 1 full day
const moonLight = new THREE.PointLight(0x8888ff, 0, 500);
moonLight.position.set(0, 300, 0);
scene.add(moonLight);

function updateDayNight(dt, playerX, playerZ) {
  timeOfDay = (timeOfDay + dt / DAY_DURATION) % 1;
  const t = timeOfDay;
  // Sun angle: rises at t=0.25, sets at t=0.75
  const sunAngle = (t - 0.25) * Math.PI * 2;
  const sunUp = Math.sin(sunAngle);
  const sunAcross = Math.cos(sunAngle);
  // Sun position arc relative to player
  sunLight.position.set(playerX + sunAcross * 300, Math.max(sunUp * 400, -100), playerZ + 200);
  sunLight.target.position.set(playerX, 0, playerZ);
  sunMesh.position.set(playerX + sunAcross * 800, Math.max(sunUp * 600, -200), playerZ + 200);
  sunMesh.visible = sunUp > -0.05;
  // Sun intensity & color
  const dayFactor = THREE.MathUtils.clamp(sunUp * 3, 0, 1);
  sunLight.intensity = dayFactor * 2.2;
  const horizonFactor = 1 - Math.abs(sunUp);
  const sunColor = new THREE.Color().setHSL(0.1 - horizonFactor * 0.07, 0.6 + horizonFactor * 0.3, 0.5 + dayFactor * 0.4);
  sunLight.color.copy(sunColor);
  // Sky color
  const nightSky = new THREE.Color(0x0a0a2a);
  const daySky = new THREE.Color(0x87CEEB);
  const dawnSky = new THREE.Color(0xe8836b);
  let skyColor;
  if (dayFactor > 0.5) skyColor = daySky.clone();
  else if (dayFactor > 0.05) skyColor = nightSky.clone().lerp(dawnSky, dayFactor * 2).lerp(daySky, Math.max(0, (dayFactor - 0.25) * 4));
  else skyColor = nightSky.clone();
  scene.background.copy(skyColor);
  scene.fog.color.copy(skyColor);
  // Ambient
  ambientLight.intensity = 0.15 + dayFactor * 0.55;
  // Moon
  moonLight.intensity = (1 - dayFactor) * 0.4;
  moonLight.position.set(playerX - sunAcross * 400, Math.max(-sunUp * 300, 50), playerZ - 200);
}

// ── Fireflies ───────────────────────────────────────────────────────
const FIREFLY_COUNT = 30;
const fireflies = [];
const fireflyGeo = new THREE.SphereGeometry(0.08, 4, 4);
for (let i = 0; i < FIREFLY_COUNT; i++) {
  const mat = new THREE.MeshBasicMaterial({ color: 0xccff66, transparent: true, opacity: 0 });
  const m = new THREE.Mesh(fireflyGeo, mat);
  const a = Math.random() * Math.PI * 2, r = 10 + Math.random() * 200;
  m.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
  m.visible = false;
  scene.add(m);
  fireflies.push({ mesh: m, mat, dir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(),
    speed: 0.5 + Math.random() * 1.5, phase: Math.random() * Math.PI * 2 });
}

function updateFireflies(dt, elapsed) {
  const isNight = timeOfDay < 0.2 || timeOfDay > 0.8;
  const nightFade = isNight ? Math.min(1, timeOfDay < 0.2 ? (0.2 - timeOfDay) * 10 : (timeOfDay - 0.8) * 10) : 0;
  for (const f of fireflies) {
    f.mesh.visible = nightFade > 0.01;
    if (!f.mesh.visible) continue;
    f.mesh.position.x += f.dir.x * f.speed * dt;
    f.mesh.position.z += f.dir.z * f.speed * dt;
    const ty = getTerrainHeight(f.mesh.position.x, f.mesh.position.z);
    f.mesh.position.y = ty + 1 + Math.sin(elapsed * 2 + f.phase) * 2;
    f.mat.opacity = nightFade * (0.5 + Math.sin(elapsed * 3 + f.phase) * 0.4);
    if (Math.random() < dt * 0.3) f.dir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
  }
}

// ── Weather System ──────────────────────────────────────────────────
let weather = 'clear', weatherTimer = 60 + Math.random() * 60;
const rainOverlay = document.getElementById('rain-overlay');
const lightningFlash = document.getElementById('lightning-flash');
const hudWeather = document.getElementById('hud-weather');
const baseFogDensity = 0.0018;

// Rain particles
const RAIN_COUNT = 500;
const rainGeo = new THREE.BufferGeometry();
const rainPositions = new Float32Array(RAIN_COUNT * 6); // 2 verts per line
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
const rainMat = new THREE.LineBasicMaterial({ color: 0x8abbde, transparent: true, opacity: 0.4 });
const rainLines = new THREE.LineSegments(rainGeo, rainMat);
rainLines.visible = false;
scene.add(rainLines);

function triggerLightning() {
  lightningFlash.style.transition = 'opacity 0.05s';
  lightningFlash.style.opacity = '0.7';
  setTimeout(() => { lightningFlash.style.transition = 'opacity 0.3s'; lightningFlash.style.opacity = '0'; }, 100);
  setTimeout(() => {
    lightningFlash.style.transition = 'opacity 0.05s'; lightningFlash.style.opacity = '0.5';
    setTimeout(() => { lightningFlash.style.transition = 'opacity 0.4s'; lightningFlash.style.opacity = '0'; }, 80);
  }, 2000);
}

function updateWeather(dt) {
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    weather = weather === 'clear' ? 'rain' : 'clear';
    weatherTimer = 60 + Math.random() * 60;
    rainLines.visible = weather === 'rain';
    rainOverlay.style.opacity = weather === 'rain' ? '1' : '0';
    hudWeather.textContent = weather === 'rain' ? '🌧️ Rain' : '☀️ Clear';
    if (weather === 'rain') triggerLightning();
  }
  scene.fog.density = weather === 'rain' ? baseFogDensity * 2.5 : baseFogDensity;
  if (weather === 'rain') {
    const pp = inVR ? cameraRig.position : camera.position;
    const arr = rainGeo.attributes.position.array;
    for (let i = 0; i < RAIN_COUNT; i++) {
      let idx = i * 6;
      let y = arr[idx + 1];
      if (y === 0 || y < getTerrainHeight(arr[idx], arr[idx + 2]) - 2) {
        const rx = pp.x + (Math.random() - 0.5) * 80, rz = pp.z + (Math.random() - 0.5) * 80;
        arr[idx] = rx; arr[idx+1] = pp.y + 20 + Math.random() * 30; arr[idx+2] = rz;
        arr[idx+3] = rx; arr[idx+4] = arr[idx+1] - 1.5; arr[idx+5] = rz;
      } else {
        const fall = 35 * dt;
        arr[idx+1] -= fall; arr[idx+4] -= fall;
      }
    }
    rainGeo.attributes.position.needsUpdate = true;
  }
}

// ── Noise helper ───────────────────────────────────────────────────
const perlin = new ImprovedNoise();

function fbm(x, z, octaves, lacunarity, gain) {
  let value = 0, amplitude = 1, frequency = 1, maxVal = 0;
  for (let i = 0; i < octaves; i++) {
    value += amplitude * perlin.noise(x * frequency, z * frequency, 0);
    maxVal += amplitude;
    amplitude *= gain;
    frequency *= lacunarity;
  }
  return value / maxVal;
}

// ── Terrain ────────────────────────────────────────────────────────
function generateTerrain() {
  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS);
  geo.rotateX(-Math.PI / 2);

  const verts = geo.attributes.position;
  const scale = 0.004;

  for (let i = 0; i < verts.count; i++) {
    const x = verts.getX(i);
    const z = verts.getZ(i);

    // Multi-octave noise for natural terrain
    let h = fbm(x * scale, z * scale, 6, 2.0, 0.48) * 60;
    // Broad rolling hills
    h += fbm(x * scale * 0.3, z * scale * 0.3, 3, 2.0, 0.5) * 35;
    // Gentle large undulation
    h += Math.sin(x * 0.003) * Math.cos(z * 0.004) * 12;

    verts.setY(i, h);
  }

  geo.computeVertexNormals();

  // Vertex colors for terrain
  const colors = new Float32Array(verts.count * 3);
  for (let i = 0; i < verts.count; i++) {
    const y = verts.getY(i);
    const normal = new THREE.Vector3();
    normal.fromBufferAttribute(geo.attributes.normal, i);
    const slope = 1 - normal.y;

    let r, g, b;
    if (y < -8) {
      // Dark green valley
      r = 0.22; g = 0.38; b = 0.15;
    } else if (y < 15) {
      // Lush grass
      const t = (y + 8) / 23;
      r = 0.25 + t * 0.15; g = 0.45 + t * 0.12; b = 0.12 + t * 0.08;
    } else if (y < 40) {
      // Light grass / dirt
      const t = (y - 15) / 25;
      r = 0.35 + t * 0.2; g = 0.52 - t * 0.1; b = 0.18 + t * 0.05;
    } else {
      // Rocky top
      r = 0.55; g = 0.50; b = 0.42;
    }

    // Slope darkening
    if (slope > 0.3) {
      const s = Math.min((slope - 0.3) * 2, 1);
      r = THREE.MathUtils.lerp(r, 0.35, s);
      g = THREE.MathUtils.lerp(g, 0.30, s);
      b = THREE.MathUtils.lerp(b, 0.22, s);
    }

    // Subtle noise variation
    const nv = fbm(verts.getX(i) * 0.05, verts.getZ(i) * 0.05, 2, 2, 0.5) * 0.06;
    colors[i * 3]     = Math.max(0, Math.min(1, r + nv));
    colors[i * 3 + 1] = Math.max(0, Math.min(1, g + nv));
    colors[i * 3 + 2] = Math.max(0, Math.min(1, b + nv * 0.5));
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 0.9,
    metalness: 0.0,
    flatShading: false,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  return mesh;
}

// Height sampling via raycaster
const terrainRaycaster = new THREE.Raycaster();
const downVec = new THREE.Vector3(0, -1, 0);

function getTerrainHeight(x, z) {
  terrainRaycaster.set(new THREE.Vector3(x, 500, z), downVec);
  const hits = terrainRaycaster.intersectObject(terrain);
  return hits.length > 0 ? hits[0].point.y : 0;
}

function createTreeGeometry() {
  // Trunk
  const trunk = new THREE.CylinderGeometry(0.3, 0.5, 4, 6);
  trunk.translate(0, 2, 0);

  // Foliage layers
  const foliage1 = new THREE.ConeGeometry(3.5, 6, 7);
  foliage1.translate(0, 7, 0);

  const foliage2 = new THREE.ConeGeometry(2.8, 5, 7);
  foliage2.translate(0, 10, 0);

  const foliage3 = new THREE.ConeGeometry(1.8, 4, 7);
  foliage3.translate(0, 12.5, 0);

  return { trunk, foliage1, foliage2, foliage3 };
}

function placeTrees() {
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.95 });

  const foliageColors = [0x2D5A1E, 0x3A6B2A, 0x1E4A15, 0x2B6622, 0x3D7530];

  const { trunk, foliage1, foliage2, foliage3 } = createTreeGeometry();

  // Use instanced meshes for performance
  const trunkInstanced = new THREE.InstancedMesh(trunk, trunkMat, TREE_COUNT);
  trunkInstanced.castShadow = true;
  trunkInstanced.receiveShadow = true;

  const foliageMats = foliageColors.map(c =>
    new THREE.MeshStandardMaterial({ color: c, roughness: 0.85, flatShading: true })
  );

  // We'll group foliage into separate instanced meshes per layer
  const f1 = new THREE.InstancedMesh(foliage1, foliageMats[0], TREE_COUNT);
  const f2 = new THREE.InstancedMesh(foliage2, foliageMats[1], TREE_COUNT);
  const f3 = new THREE.InstancedMesh(foliage3, foliageMats[2], TREE_COUNT);
  [f1, f2, f3].forEach(m => { m.castShadow = true; m.receiveShadow = true; });

  const dummy = new THREE.Object3D();
  const positions = [];

  for (let i = 0; i < TREE_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 20 + Math.random() * (TERRAIN_SIZE * 0.45);
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;
    const y = getTerrainHeight(x, z);

    // Skip if on steep slopes or too high
    if (y > 45) continue;

    const scale = 0.7 + Math.random() * 0.8;
    const rotY = Math.random() * Math.PI * 2;

    dummy.position.set(x, y, z);
    dummy.scale.set(scale, scale, scale);
    dummy.rotation.set(0, rotY, 0);
    dummy.updateMatrix();

    trunkInstanced.setMatrix(i, dummy.matrix);
    f1.setMatrix(i, dummy.matrix);
    f2.setMatrix(i, dummy.matrix);
    f3.setMatrix(i, dummy.matrix);

    // Randomize foliage color per instance
    const col = new THREE.Color(foliageColors[Math.floor(Math.random() * foliageColors.length)]);
    f1.setColorAt(i, col);
    f2.setColorAt(i, col.clone().offsetHSL(0, 0, 0.05));
    f3.setColorAt(i, col.clone().offsetHSL(0.02, 0, 0.08));

    positions.push({ x, y, z, scale });
  }

  scene.add(trunkInstanced, f1, f2, f3);
  return positions;
}

const GEM_COUNT = 15, GEM_COLLECT_DIST = 2;
const gemColors = [0xff3333, 0x3399ff, 0x33cc66, 0xffcc00, 0xaa44ff];
const gems = [];
let gemsCollected = 0;

for (let i = 0; i < GEM_COUNT; i++) {
  const color = gemColors[i % gemColors.length];
  const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, roughness: 0.2, metalness: 0.5 });
  const mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.5, 0), mat);
  const ang = Math.random() * Math.PI * 2, rad = 20 + Math.random() * 280;
  const gx = Math.cos(ang) * rad, gz = Math.sin(ang) * rad;
  mesh.position.set(gx, getTerrainHeight(gx, gz) + 1.5, gz);
  mesh.castShadow = true;
  scene.add(mesh);
  gems.push({ mesh, baseY: mesh.position.y, collected: false });
}

function updateGems(dt, elapsed) {
  const pp = inVR ? cameraRig.position : camera.position;
  for (const g of gems) {
    if (g.collected) continue;
    g.mesh.rotation.y += dt * 1.5;
    g.mesh.position.y = g.baseY + Math.sin(elapsed * 2 + g.baseY) * 0.3;
    const dx = pp.x - g.mesh.position.x, dz = pp.z - g.mesh.position.z;
    if (Math.sqrt(dx*dx + dz*dz) < GEM_COLLECT_DIST) {
      g.collected = true; scene.remove(g.mesh); gemsCollected++;
      document.getElementById('hud-gems').textContent = `${gemsCollected} / ${GEM_COUNT}`;
    }
  }
  // VR: check right controller world position against gems
  if (inVR && controller1) {
    const cPos = new THREE.Vector3(); controller1.getWorldPosition(cPos);
    for (const g of gems) {
      if (g.collected) continue;
      if (cPos.distanceTo(g.mesh.position) < GEM_COLLECT_DIST) {
        g.collected = true; scene.remove(g.mesh); gemsCollected++;
        document.getElementById('hud-gems').textContent = `${gemsCollected} / ${GEM_COUNT}`;
      }
    }
  }
}

function updateNPCs(dt) {
  const pp = inVR ? cameraRig.position : camera.position;
  nearestNPC = null; let nearD = Infinity;
  for (const n of npcs) {
    const p = n.group.position;
    if (n.isWalking) {
      p.x += n.walkDir.x * 2.5 * dt; p.z += n.walkDir.z * 2.5 * dt;
      p.y = getTerrainHeight(p.x, p.z);
      if ((n.walkTimer -= dt) <= 0) { n.isWalking = false; n.pauseTimer = 1.5 + Math.random() * 2; }
    } else if ((n.pauseTimer -= dt) <= 0) {
      n.isWalking = true; n.walkTimer = 3 + Math.random() * 2;
      n.walkDir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
    }
    const dx = pp.x - p.x, dz = pp.z - p.z, dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < NPC_DIST) { n.group.rotation.y = Math.atan2(dx, dz); n.isWalking = false; }
    const glow = dist < NPC_DIST;
    if (glow !== n.highlighted) {
      n.highlighted = glow;
      n.bodyMat.emissive.copy(glow ? new THREE.Color(n.def.color).multiplyScalar(0.35) : new THREE.Color(0));
    }
    if (dist < nearD && dist < NPC_DIST) { nearD = dist; nearestNPC = n; }
  }
  interactHint.style.display = (nearestNPC && !dialogOpen) ? 'block' : 'none';
}

// ── Animation loop ─────────────────────────────────────────────────
const clock = new THREE.Clock();
let prevTerrainY = getTerrainHeight(0, 0);

function getCardinal(yaw) {
  const deg = ((THREE.MathUtils.radToDeg(yaw) % 360) + 360) % 360;
  const dirs = ['N', 'NW', 'W', 'SW', 'S', 'SE', 'E', 'NE'];
  return dirs[Math.round(deg / 45) % 8];
}

function animate() {
  const dt = Math.min(clock.getDelta(), 0.1);

  if (inVR) {
    // ── VR locomotion ──
    // Left thumbstick: walk/strafe relative to head direction
    const [lx, lz] = getVRThumbstickAxes('left');
    if (Math.abs(lx) > 0.1 || Math.abs(lz) > 0.1) {
      // Get head forward direction projected onto XZ plane
      const headQuat = new THREE.Quaternion();
      const xrCamera = renderer.xr.getCamera();
      xrCamera.getWorldQuaternion(headQuat);
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(headQuat);
      forward.y = 0; forward.normalize();
      const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

      const vrSprint = getVRGripPressed() && !sprintLocked && stamina > 0;
      const vrSpeed = vrSprint ? RUN_SPEED : WALK_SPEED;
      const moveVec = new THREE.Vector3();
      moveVec.addScaledVector(right, lx * vrSpeed * dt);
      moveVec.addScaledVector(forward, -lz * vrSpeed * dt);
      cameraRig.position.add(moveVec);
    }

    // Right thumbstick: snap turn (X axis)
    const [rx] = getVRThumbstickAxes('right');
    vrTurnCooldown = Math.max(0, vrTurnCooldown - dt);
    if (Math.abs(rx) > 0.6 && vrTurnCooldown <= 0) {
      cameraRig.rotation.y -= Math.sign(rx) * Math.PI / 6; // 30-degree snap
      vrTurnCooldown = 0.3;
    }

    // Clamp rig to terrain bounds
    const halfVR = TERRAIN_SIZE * 0.49;
    cameraRig.position.x = THREE.MathUtils.clamp(cameraRig.position.x, -halfVR, halfVR);
    cameraRig.position.z = THREE.MathUtils.clamp(cameraRig.position.z, -halfVR, halfVR);

    // Gravity for VR rig
    const vrTerrainY = getTerrainHeight(cameraRig.position.x, cameraRig.position.z);
    velocityY = Math.max(velocityY - 20 * dt, -30);
    cameraRig.position.y += velocityY * dt;
    if (cameraRig.position.y <= vrTerrainY) { cameraRig.position.y = vrTerrainY; velocityY = 0; onGround = true; }

    // VR A-button (button 4) on right controller to interact with NPC
    const session = renderer.xr.getSession();
    if (session) {
      for (const source of session.inputSources) {
        if (source.handedness === 'right' && source.gamepad && source.gamepad.buttons[4]) {
          if (source.gamepad.buttons[4].pressed && nearestNPC && !dialogOpen) openNPCDialog(nearestNPC);
          if (source.gamepad.buttons[5] && source.gamepad.buttons[5].pressed && onGround) { velocityY = 8; onGround = false; }
        }
      }
    }
  } else if (isLocked) {
    // ── Desktop locomotion ──
    const wantSprint = keys['ShiftLeft'] || keys['ShiftRight'];
    const canSprint = wantSprint && !sprintLocked && stamina > 0;
    const speed = canSprint ? RUN_SPEED : WALK_SPEED;

    direction.set(0, 0, 0);
    if (keys['KeyW'] || keys['ArrowUp'])    direction.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  direction.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  direction.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) direction.x += 1;

    if (direction.length() > 0) {
      direction.normalize();
      const sin = Math.sin(yaw);
      const cos = Math.cos(yaw);
      const dx = direction.x * cos - direction.z * sin;
      const dz = direction.x * sin + direction.z * cos;
      velocity.x = dx * speed;
      velocity.z = dz * speed;
    } else {
      velocity.x *= 0.85;
      velocity.z *= 0.85;
    }

    camera.position.x += velocity.x * dt;
    camera.position.z += velocity.z * dt;

    const halfSize = TERRAIN_SIZE * 0.49;
    camera.position.x = THREE.MathUtils.clamp(camera.position.x, -halfSize, halfSize);
    camera.position.z = THREE.MathUtils.clamp(camera.position.z, -halfSize, halfSize);

    const terrainY = getTerrainHeight(camera.position.x, camera.position.z);
    const groundY = terrainY + PLAYER_HEIGHT;
    velocityY = Math.max(velocityY - 20 * dt, -30);
    camera.position.y += velocityY * dt;
    if (camera.position.y <= groundY) { camera.position.y = groundY; velocityY = 0; onGround = true; }
    prevTerrainY = camera.position.y;

    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    hudPos.textContent = `${camera.position.x.toFixed(0)}, ${camera.position.z.toFixed(0)}`;
    hudDir.textContent = getCardinal(yaw);
    hudAlt.textContent = (camera.position.y - PLAYER_HEIGHT).toFixed(1);
  }

  // Stamina update
  {
    const moving = inVR ? (Math.abs(getVRThumbstickAxes('left')[0])>0.1 || Math.abs(getVRThumbstickAxes('left')[1])>0.1) : direction.length() > 0;
    const sprinting = inVR ? (getVRGripPressed() && moving) : ((keys['ShiftLeft']||keys['ShiftRight']) && moving);
    if (sprinting && !sprintLocked && stamina > 0) {
      stamina = Math.max(0, stamina - 20 * dt);
      if (stamina <= 0) sprintLocked = true;
    } else {
      stamina = Math.min(100, stamina + 15 * dt);
      if (sprintLocked && stamina >= 20) sprintLocked = false;
    }
    staminaFill.style.width = stamina + '%';
    staminaFill.style.background = stamina > 50 ? '#4CAF50' : stamina > 25 ? '#FFC107' : '#F44336';
  }

  // Day/night cycle
  const pp = inVR ? cameraRig.position : camera.position;
  updateDayNight(dt, pp.x, pp.z);
  if (!inVR) {
    const totalMin = Math.floor(timeOfDay * 1440);
    hudTime.textContent = `${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
  }

  // Weather
  updateWeather(dt);

  // Fireflies
  updateFireflies(dt, clock.elapsedTime);

  // Minimap (desktop only)
  minimapCanvas.style.display = inVR ? 'none' : 'block';
  if (!inVR) drawMinimap();

  // Update gems
  updateGems(dt, clock.elapsedTime);

  // Update NPCs
  updateNPCs(dt);

  // Animate water UV
  waterGeo.attributes.uv.array[0] += dt * 0.02; waterGeo.attributes.uv.array[2] += dt * 0.02;
  waterGeo.attributes.uv.array[4] += dt * 0.02; waterGeo.attributes.uv.array[6] += dt * 0.02;
  waterGeo.attributes.uv.needsUpdate = true;
  waterPlane.position.y = -2 + Math.sin(clock.elapsedTime * 0.5) * 0.3;

  // Animate clouds
  for (const cloud of clouds) {
    cloud.position.x += cloud.userData.speed * dt;
    if (cloud.position.x > 1000) cloud.position.x = -1000;
  }

  // Auto-save every 10 seconds
  saveTimer += dt;
  if (saveTimer >= 10) { saveTimer = 0; saveGame(); }

  renderer.render(scene, camera);
}

// ── Resize handler ─────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Save / Load ─────────────────────────────────────────────────────
const saveToast = document.getElementById('save-toast');
const settingsPanel = document.getElementById('settings-panel');
let saveTimer = 0;

function saveGame() {
  const data = {
    px: camera.position.x, pz: camera.position.z, gems: gemsCollected,
    npcQuests: npcs.map(n => n.questState),
    gemCollected: gems.map(g => g.collected),
  };
  localStorage.setItem('wanderer_save', JSON.stringify(data));
  saveToast.style.opacity = '1';
  setTimeout(() => saveToast.style.opacity = '0', 2000);
}

function loadGame() {
  const raw = localStorage.getItem('wanderer_save');
  if (!raw) return false;
  try {
    const d = JSON.parse(raw);
    camera.position.x = d.px || 0; camera.position.z = d.pz || 0;
    camera.position.y = getTerrainHeight(d.px || 0, d.pz || 0) + PLAYER_HEIGHT;
    prevTerrainY = camera.position.y;
    gemsCollected = d.gems || 0;
    document.getElementById('hud-gems').textContent = `${gemsCollected} / ${GEM_COUNT}`;
    if (d.npcQuests) d.npcQuests.forEach((q, i) => { if (npcs[i]) npcs[i].questState = q; });
    if (d.gemCollected) d.gemCollected.forEach((c, i) => { if (gems[i] && c) { gems[i].collected = true; scene.remove(gems[i].mesh); } });
    return true;
  } catch { return false; }
}

document.getElementById('reset-save-btn').addEventListener('click', () => {
  localStorage.removeItem('wanderer_save'); location.reload();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Tab') { e.preventDefault(); settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block'; }
});

// ── Start ──────────────────────────────────────────────────────────
if (!loadGame()) {
  const startY = getTerrainHeight(0, 0) + PLAYER_HEIGHT;
  camera.position.set(0, startY, 0);
  prevTerrainY = startY;
}

renderer.setAnimationLoop(animate);
</script>
</body>
</html>
